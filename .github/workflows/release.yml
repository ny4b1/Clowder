name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows NSIS
            platform: windows-latest
            bundles: nsis
            artifact-glob: src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS DMG
            platform: macos-latest
            bundles: dmg
            artifact-glob: src-tauri/target/release/bundle/dmg/*.dmg
          - name: Linux AppImage
            platform: ubuntu-latest
            bundles: appimage
            artifact-glob: src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - run: npm ci

      - name: Build Tauri bundle
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          name: Clowder ${{ github.ref_name }}
          files: ${{ matrix.artifact-glob }}
